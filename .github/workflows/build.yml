name: build
on:
  workflow_dispatch:
jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read app version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          echo "name=fl_ide-${VERSION}-alpha" >> $GITHUB_OUTPUT

      - name: Get dependencies
        run: flutter pub get

      # ── Debug build ───────────────────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
          CMAKE_BUILD_PARALLEL_LEVEL: "2"

      - name: Rename debug APK
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/${{ steps.version.outputs.name }}-debug.apk

      # ── Release build ─────────────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
          CMAKE_BUILD_PARALLEL_LEVEL: "2"

      - name: Rename release APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${{ steps.version.outputs.name }}-release.apk

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.name }}-debug
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.name }}-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.name }}-release
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.name }}-release.apk
          retention-days: 30
