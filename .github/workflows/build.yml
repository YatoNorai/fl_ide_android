name: build
on:
  workflow_dispatch:

permissions:
  contents: write   # necessário para criar releases

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Rust Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android

      - name: Read app version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-alpha" >> $GITHUB_OUTPUT
          echo "base=fl_ide-${VERSION}-alpha" >> $GITHUB_OUTPUT

      - name: Get dependencies
        run: flutter pub get

      # ── Debug build (split per ABI) ───────────────────────────────────────
      - name: Build debug APKs
        run: flutter build apk --debug --split-per-abi
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
          CMAKE_BUILD_PARALLEL_LEVEL: "2"

      - name: Rename debug APKs
        run: |
          BASE=${{ steps.version.outputs.base }}
          APK_DIR=build/app/outputs/flutter-apk
          mv "$APK_DIR/app-arm64-v8a-debug.apk"    "$APK_DIR/${BASE}-arm64-v8a-debug.apk"
          mv "$APK_DIR/app-armeabi-v7a-debug.apk"  "$APK_DIR/${BASE}-armeabi-v7a-debug.apk"
          mv "$APK_DIR/app-x86_64-debug.apk"       "$APK_DIR/${BASE}-x86_64-debug.apk"

      # ── Release build (split per ABI) ─────────────────────────────────────
      - name: Build release APKs
        run: flutter build apk --release --split-per-abi
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
          CMAKE_BUILD_PARALLEL_LEVEL: "2"

      - name: Rename release APKs
        run: |
          BASE=${{ steps.version.outputs.base }}
          APK_DIR=build/app/outputs/flutter-apk
          mv "$APK_DIR/app-arm64-v8a-release.apk"    "$APK_DIR/${BASE}-arm64-v8a-release.apk"
          mv "$APK_DIR/app-armeabi-v7a-release.apk"  "$APK_DIR/${BASE}-armeabi-v7a-release.apk"
          mv "$APK_DIR/app-x86_64-release.apk"       "$APK_DIR/${BASE}-x86_64-release.apk"

      # ── Upload artifacts (cache de 30 dias) ───────────────────────────────
      - name: Upload debug APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.base }}-debug
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.base }}-*-debug.apk
          retention-days: 30

      - name: Upload release APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.base }}-release
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.base }}-*-release.apk
          retention-days: 30

      # ── Publicar no GitHub Releases ───────────────────────────────────────
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "FL IDE ${{ steps.version.outputs.version }} (alpha)"
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/${{ steps.version.outputs.base }}-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/${{ steps.version.outputs.base }}-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/${{ steps.version.outputs.base }}-x86_64-release.apk
            build/app/outputs/flutter-apk/${{ steps.version.outputs.base }}-arm64-v8a-debug.apk
            build/app/outputs/flutter-apk/${{ steps.version.outputs.base }}-armeabi-v7a-debug.apk
            build/app/outputs/flutter-apk/${{ steps.version.outputs.base }}-x86_64-debug.apk
