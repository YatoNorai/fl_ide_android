name: build

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read app version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          echo "name=fl_ide-${VERSION}-alpha" >> $GITHUB_OUTPUT

      - name: Get dependencies
        run: flutter pub get

# ── Fetch tree-sitter grammars ───────────────────────────────────────────
      - name: Fetch tree-sitter grammars (quill_code)
        run: |
          QUILL_DIR=$(find ~/.pub-cache/git -maxdepth 1 -name "quill_code-*" -type d | head -n 1)
          echo "Found quill_code at: $QUILL_DIR"
          chmod +x "$QUILL_DIR/scripts/fetch_grammars.sh"
          bash "$QUILL_DIR/scripts/fetch_grammars.sh"
          

      # ── Debug build ──────────────────────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename debug APK
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/${{ steps.version.outputs.name }}-debug.apk

      # ── Release build ────────────────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release

      - name: Rename release APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${{ steps.version.outputs.name }}-release.apk

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.name }}-debug
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.name }}-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.name }}-release
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.name }}-release.apk
          retention-days: 30
